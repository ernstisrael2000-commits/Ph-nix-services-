<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rena Admin - Bouton Audit</title>
    <!-- Chargement de la police DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rena-white: #ffffff;
            --rena-blue-light: #e8eeff;
            --rena-blue-primary: #1a56ff;
            --rena-text-dark: #1a1f3c; /* Navy dark cohérent avec le dashboard */
            --rena-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --rena-shadow-hover: 0 8px 20px rgba(26, 86, 255, 0.12);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f8f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Conteneur pour tester la compatibilité du scroll horizontal */
        .scroll-container {
            width: 100%;
            max-width: 600px;
            overflow-x: auto;
            padding: 20px 0;
            display: flex;
            gap: 15px;
            white-space: nowrap;
            scrollbar-width: none; /* Firefox */
        }
        
        .scroll-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        /* 🎯 Style du bouton Audit */
        .rena-audit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: var(--rena-white);
            border: 1px solid transparent;
            border-radius: 16px;
            padding: 12px 24px;
            box-shadow: var(--rena-shadow);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--rena-text-dark);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            min-width: 140px;
            flex-shrink: 0; /* Important pour le scroll horizontal */
        }

        /* ✨ Effets au survol (Hover) */
        @media (hover: hover) {
            .rena-audit-btn:hover {
                background-color: var(--rena-blue-light);
                transform: translateY(-2px);
                box-shadow: var(--rena-shadow-hover);
            }
        }

        /* ✨ Effet au clic (Active) */
        .rena-audit-btn:active {
            transform: translateY(0) scale(0.98);
            color: var(--rena-blue-primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .rena-audit-btn svg {
            width: 20px;
            height: 20px;
            transition: stroke 0.3s ease;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* Responsive Mobile */
        @media (max-width: 480px) {
            .rena-audit-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
            .rena-audit-btn svg {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <!-- Bouton Audit -->
        <button class="rena-audit-btn" onclick="goToAudit()" aria-label="Lancer l'audit">
            <!-- Icône de Document / Vérification -->
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <path d="M9 15.5l2 2 4-4"></path>
            </svg>
            <span>Audit</span>
        </button>
        
        <!-- Autres boutons fictifs pour tester le scroll -->
        <button class="rena-audit-btn" style="opacity: 0.5; filter: grayscale(1);">Analytics</button>
        <button class="rena-audit-btn" style="opacity: 0.5; filter: grayscale(1);">Paramètres</button>
    </div>

    <script>
        /**
         * ⚙️ Fonction de redirection pour l'audit
         * Le lien peut être ajouté manuellement ici plus tard.
         */
        function goToAudit() {
            // console.log("Redirection vers l'audit...");
            
            // Exemple d'utilisation future :
            // const externalLink = "https://exemple.com/audit";
            // window.location.href = externalLink;

            alert("Fonction Audit déclenchée. Le lien de redirection pourra être ajouté dans la fonction goToAudit() du script.");
        }
    </script>

</body>
</html>
